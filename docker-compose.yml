services:
  selphy-print:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PRINTER_HOST: "192.168.1.42" # <- your CP1500's IP or CP1500xxxxxx.local
      ICC_PROFILE: /profiles/CP1500-farbenwerk.icc
      ICC_INTENT: perceptual # or: relative (more accurate in-gamut, may clip saturated colors)
      OVERSCAN_SIDES_MM: "3.5" # borderless trim on the 100 mm edges — measure with the in-app calibration page
      OVERSCAN_ENDS_MM: "6.0" # borderless trim on the 148 mm edges (worst edge)
    volumes:
      - ./profiles:/profiles:ro
