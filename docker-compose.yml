services:
  selphy-print:
    build: .
    image: selphy-print
    container_name: selphy-print
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PRINTER_HOST: "192.168.1.42" # <- your CP1500's IP or CP1500xxxxxx.local
      # The free ICC profiles are baked into the image and auto-discovered
      # (selectable per photo in the app); the default is farbenwerk. To pin a
      # different default or add your own, set ICC_PROFILE / mount over
      # /app/profiles. relative intent = accurate in-gamut + black-point
      # compensation; perceptual only helps very saturated art.
      ICC_INTENT: relative
      # Per-edge trim "top,bottom,left,right" in mm (crop-editor orientation).
      # Measure it with the in-app calibration page (T/B/L/R letters); this is
      # the server-wide default, overridable per device in the browser.
      OVERSCAN_MM: "1,1,1,1"
    volumes:
      # Keep a copy of every print (untouched upload + rendered image).
      # The dir is owned by the container's `node` user (uid 1000).
      - ./print-archive:/app/print-archive
    # The printer is reached by the IP above, which works with bridged
    # networking. To use its CP1500xxxxxx.local mDNS name instead, uncomment:
    # network_mode: host
