services:
  selphy-print:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PRINTER_HOST: "192.168.1.42" # <- your CP1500's IP or CP1500xxxxxx.local
      ICC_PROFILE: /profiles/CP1500-farbenwerk.icc
      ICC_INTENT: perceptual # or: relative (more accurate in-gamut, may clip saturated colors)
      # Edge trim "top,bottom,left,right" in mm (crop-editor orientation);
      # prints are 1:1 rasters so this is registration only — measure with
      # the in-app calibration page (T/B/L/R letters)
      OVERSCAN_MM: "1,1,1,1"
    volumes:
      - ./profiles:/profiles:ro
